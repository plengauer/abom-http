name: 'Recompile Agentic Workflows'

on:
  push:
    branches: main
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/recompile_agentic_workflows.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  recompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@af83be0ddf1ec3035230c030f3ab6d10a7040515 # v5.56.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: |-
            ${{ github.token }}
            ${{ secrets.ACTIONS_GITHUB_TOKEN }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        run: |
          gh extension install github/gh-aw
          gh aw compile --approve
      - id: push
        run: |
          if [ -z "$(git status --porcelain)" ]; then exit 0; fi
          user_name="$(gh api user --jq .login)"
          user_id="$(gh api user --jq .id)"
          git config user.name "$user_name"
          git config user.email "${user_id}+${user_name}@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git commit -m "recompile agentic workflows"
          git push && echo "pushed=true" >> "$GITHUB_OUTPUT" || echo "pushed=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
      - if: steps.push.outputs.pushed == 'false'
        id: open-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          commit-message: "recompile agentic workflows"
          base: ${{ github.ref_name }}
          branch: "agentic-workflows/auto-recompile-aw-${{ github.ref_name }}"
          title: "Recompile Agentic Workflows"
          body: |
            (this PR is automatically generated)
          delete-branch: true
      - if: steps.open-pr.outputs.pull-request-number != null
        run: sleep 60 # make sure PR state is updated and API can catch up
      - if: steps.open-pr.outputs.pull-request-number != null
        shell: bash
        run: gh pr merge --squash --auto ${{ steps.open-pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        continue-on-error: true
