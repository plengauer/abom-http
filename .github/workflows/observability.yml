name: OpenTelemetry

on:
  workflow_run:
    workflows: [.github/workflows/copilot-setup-steps.yml, Autorerun, Autoversion, CI, Claude, CodeQL, Copilot code review, Copilot coding agent, OpenAI Codex, Publish, Renovate]
    types:
      - completed

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/workflow@v5.50.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
    permissions:
      actions: read
    container: ghcr.io/plengauer/opentelemetry-github-workflow-instrumentation-runner:v5.50.0
